name: publish

# Publishes to PyPI via Trusted Publishing (OIDC) — no API tokens stored.
# Fires when a GitHub Release is published, or on manual dispatch.
# One-time setup on PyPI: add a Trusted Publisher (or a pending publisher
# for the first upload) with owner=sanjeevkkansal, repo=solfleet,
# workflow=publish.yml, environment=pypi.

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  pypi:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv build
      - uses: pypa/gh-action-pypi-publish@release/v1
